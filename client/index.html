<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Monolith Project</title>
  <meta name="description" content="Togetherness is the frequency. Music is the guide. A Chicago events collective." />
  <link rel="stylesheet" href="/fonts/fonts.css" />

  <!-- Preload critical LCP Hero assets with responsive srcset -->
  <link rel="preload" as="image"
    href="/images/generated/chasing-sunsets-1280.avif"
    imagesrcset="/images/generated/chasing-sunsets-640.avif 640w, /images/generated/chasing-sunsets-960.avif 960w, /images/generated/chasing-sunsets-1280.avif 1280w, /images/generated/chasing-sunsets-1600.avif 1600w"
    imagesizes="100vw"
    type="image/avif"
    fetchpriority="high" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- SS-Tier Native App Styling -->
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="theme-color" content="#E8B86D" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://monolithproject.com/" />
  <meta property="og:title" content="The Monolith Project" />
  <meta property="og:description"
    content="Togetherness is the frequency. Music is the guide. A Chicago events collective." />
  <meta property="og:image" content="https://monolithproject.com/og-image.jpg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://monolithproject.com/" />
  <meta name="twitter:title" content="The Monolith Project" />
  <meta name="twitter:description"
    content="Togetherness is the frequency. Music is the guide. A Chicago events collective." />
  <meta name="twitter:image" content="https://monolithproject.com/og-image.jpg" />

  <!-- APP_HERO_PRELOADS -->
</head>

<body>
  <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=166134370742863&ev=PageView&noscript=1" /></noscript>
  <div id="initial-loader"
    style="position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s">
    <span style="font-family:'Archivo Black',system-ui,sans-serif;color:#c8a45a;letter-spacing:0.32em;font-size:18px;font-weight:900">MONOLITH PROJECT</span>
  </div>
  <script defer src="/initial-loader.js"></script>
  <div id="root"></div>

  <!-- Unreplicable Architectural Layer: Analogue Grain & Liquid Displacement -->
  <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
    <filter id="liquid-distortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2" result="noise">
        <animate attributeName="seed" from="1" to="100" dur="10s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="analogue-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
    </filter>
  </svg>

  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
