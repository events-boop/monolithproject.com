  <!-- Open Graph / Facebook -->

  <!-- IndexNow — instant search engine ping on content change -->
  <meta name="indexnow-key" content="eb429ff55e9dae8ecfc8b8be13c6bf2b" />

  <!-- APP_HERO_PRELOADS -->
</head>

<body>
  <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=166134370742863&ev=PageView&noscript=1" /></noscript>
  <div id="initial-loader" aria-hidden="true">
    <div class="initial-loader__bg"></div>
    <div class="initial-loader__veil"></div>
    <div class="initial-loader__grain"></div>
    <div class="initial-loader__glow"></div>
    <div class="initial-loader__content">
      <div class="initial-loader__slab"></div>
      <div class="initial-loader__wordmark">
        <span class="initial-loader__layer initial-loader__layer--base">MONOLITH</span>
        <span class="initial-loader__layer initial-loader__layer--red">MONOLITH</span>
        <span class="initial-loader__layer initial-loader__layer--blue">MONOLITH</span>
      </div>
      <span class="initial-loader__project">PROJECT</span>
    </div>
  </div>
  <script defer src="/initial-loader.js"></script>
  <div id="root"></div>

  <!-- Unreplicable Architectural Layer: Analogue Grain & Liquid Displacement -->
  <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
    <filter id="liquid-distortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2" result="noise">
        <animate attributeName="seed" from="1" to="100" dur="10s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <filter id="analogue-grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
    </filter>
  </svg>

  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
