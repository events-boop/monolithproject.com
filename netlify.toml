[build]
  command = "node scripts/update_sitemap_lastmod.mjs && SKIP_IMAGE_GENERATION=true CI=false npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]
  included_files = ["private/documents/**"]

[[redirects]]
  from = "https://themonolithproject.com/*"
  to = "https://monolithproject.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://monolithproject.events/*"
  to = "https://monolithproject.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://chasingsunsets.world/*"
  to = "https://monolithproject.com/chasing-sunsets"
  status = 301
  force = true

[[redirects]]
  from = "https://chasingsunsets.vip/*"
  to = "https://monolithproject.com/vip"
  status = 301
  force = true

[[redirects]]
  from = "https://chasingsunsets.music/*"
  to = "https://monolithproject.com/radio"
  status = 301
  force = true

[[redirects]]
  from = "https://www.themonolithproject.com/*"
  to = "https://monolithproject.com/:splat"
  status = 301
  force = true

