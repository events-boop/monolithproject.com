[build]
  command = "node scripts/update_sitemap_lastmod.mjs && CI=false npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express"]
  included_files = ["private/documents/**"]

[[redirects]]
  from = "https://themonolithproject.com/*"
  to = "https://monolithproject.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.themonolithproject.com/*"
  to = "https://monolithproject.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/go/*"
  to = "/.netlify/functions/api/go/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Origin-Agent-Cluster = "?1"
    X-Permitted-Cross-Domain-Policies = "none"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=(), browsing-topics=(), display-capture=(), serial=(), bluetooth=(), idle-detection=(), screen-wake-lock=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests; script-src 'self' 'nonce-__CSP_NONCE__' 'strict-dynamic' https://connect.facebook.net https://static.posthog.com; style-src 'self'; style-src-elem 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob: https://www.facebook.com https://images.unsplash.com https://pogistudios.pixieset.com; font-src 'self'; connect-src 'self' https://us.i.posthog.com https://connect.facebook.net https://www.facebook.com https://forge.butterfly-effect.dev; frame-src 'self' https://www.youtube-nocookie.com https://www.youtube.com https://w.soundcloud.com; media-src 'self' blob:;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, noarchive, nosnippet"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
