functionsDirectory = "netlify/functions"
functionsDirectoryOrigin = "ui"
headers = []
redirects = []

[functions]

[functions."*"]

[[redirects]]
from = "/api/healthz"
to = "/.netlify/functions/healthz"
status = 200

[[redirects]]
from = "/api/contact"
to = "/.netlify/functions/contact"
status = 200

[[redirects]]
from = "/api/join"
to = "/.netlify/functions/join"
status = 200

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"
pinned_version = "6"

[plugins.inputs]

[build]
publish = "dist/public"
publishOrigin = "ui"
commandOrigin = "ui"
command = "npm run build"
functions = "netlify/functions"

[build.environment]

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]
