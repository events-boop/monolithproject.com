name: Site Checks

on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
      - "netlify/functions/**"
      - "package.json"
      - "netlify.toml"
      - ".netlify/netlify.toml"
      - "*.toml"
      - ".github/workflows/uploader-tests.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "netlify/functions/**"
      - "package.json"
      - "netlify.toml"
      - ".netlify/netlify.toml"
      - "*.toml"
      - ".github/workflows/uploader-tests.yml"
  workflow_dispatch:

jobs:
  site-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build static site
        run: npm run build

      - name: Run full test suite
        run: npm test
